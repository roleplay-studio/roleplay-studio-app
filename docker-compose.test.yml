# ──────────────────────────────────────────────────────────────────
#  Roleplay Studio — TEST compose override
#
#  Use this when you want to run the backend test suite inside a
#  clean container without affecting the dev data volume. Mounts
#  the source read-write so tests can write to a tmp sqlite, runs
#  pytest in the foreground, and exits with the test's exit code.
#
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.test.yml \
#      run --rm backend pytest -x
#    docker compose -f docker-compose.yml -f docker-compose.test.yml \
#      run --rm backend pytest tests/test_chat.py -k streaming
#
#  Notes:
#    - The frontend service is intentionally NOT started here.
#    - The data volume is replaced by a tmpfs so tests can't leak
#      state into the dev volume.
#    - Source mounts are read-WRITE here (no `:ro`) because some
#      tests write conftest fixtures or tmp sqlite files alongside
#      the test module. The tmpfs is small and lives only for the
#      container's lifetime.
# ──────────────────────────────────────────────────────────────────

services:
  backend:
    # Match the base compose's image name so the test override can
    # be used STANDALONE (without the base file) — without an image
    # reference, ``docker compose -f docker-compose.test.yml`` fails
    # with "service backend has neither an image nor a build context".
    # The base compose already declares this image; restating it here
    # is a no-op when both files are merged.
    image: roleplay-studio-backend:dev
    build:
      context: .
      dockerfile: Dockerfile.backend
    # Override the dev command so compose `run` defaults to a
    # shell rather than blocking the terminal with the API.
    #
    # entrypoint runs before command and unsets the dev-mode
    # vars (DEBUG / ENVIRONMENT / LOG_LEVEL) that the base
    # compose injects. Compose merges ``environment:``
    # additively and can't "unset" a variable, so the only
    # reliable scrub is at exec time. The shim lives at
    # /usr/local/bin/pytest-clean-env and is baked into the
    # image at build time (see Dockerfile.backend).
    entrypoint: ["/usr/local/bin/pytest-clean-env"]
    command: ["sleep", "infinity"]
    environment:
      # Only the env vars the tests actually need. Anything
      # the base compose injects is scrubbed by the entrypoint
      # shim before pytest starts.
      VIRTUAL_ENV: /app/.venv
      # ROLEPLAY_DATA_DIR points .env / db / chroma writes at the
      # tmpfs below. Tests typically use :memory: sqlite but the
      # few that touch disk (alembic round-trip) need a writable
      # dir.
      ROLEPLAY_DATA_DIR: /data
    volumes:
      # Re-mount source read-write for tests (the base compose is
      # read-only).
      - ./api:/app/api
      - ./app:/app/app
      - ./backend:/app/backend
      - ./scenarios:/app/scenarios
      - ./engine:/app/engine
      - ./schemas:/app/schemas
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      # tests/test_connect_i18n.py reads frontend/src/lib/i18n.ts
      # to verify the English/Russian key sets are in sync. The
      # base compose bind-mounts the whole frontend/src tree, but
      # the test override starts without a frontend service, so
      # we have to mount it here too. Read-write matches the
      # backend source above; the test never writes to it.
      - ./frontend/src:/app/frontend/src:rw
      # Alembic config — needed by init_db() on the very first
      # startup that creates the SQLite file.
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      # Throwaway data dir — wiped with the container.
      - type: tmpfs
        target: /data
        tmpfs:
          size: 256m
    # No ports mapping for tests — pytest talks to in-process
    # app via httpx.AsyncClient.

  # Frontend is omitted: pytest only needs the backend, and
  # starting Vite just to run backend tests would slow CI down.

  frontend:
    # Test-override for the frontend service. We intentionally don't
    # inherit from docker-compose.yml's frontend block — the dev
    # compose pulls in ``depends_on: backend (healthy)`` and the dev
    # command (vite dev server). For lint/vitest runs we want a
    # stand-alone container that:
    #
    #   * uses the same pre-built image (``roleplay-studio-frontend:dev``)
    #     so we don't rebuild from scratch on every test run;
    #   * has NO dependency on the backend (lint/vitest don't touch /api);
    #   * bind-mounts the frontend source read-write — some vitest
    #     suites write tmp fixtures alongside the test module;
    #   * keeps ``node_modules`` in an anonymous volume (container-built
    #     deps stay isolated from the host's macOS-built node_modules).
    #
    # compose ``run --rm frontend npm run lint`` then becomes the
    # canonical way to lint without needing the dev stack up. The
    # previous Makefile recipe (``exec frontend npm run lint``) required
    # the dev stack to be running on the host, which conflicts with
    # the operator's own ``make dev-frontend`` on :1420.
    image: roleplay-studio-frontend:dev
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # Override the dev command so compose `run` defaults to a
    # shell rather than blocking the terminal with the dev server.
    # ``npm run dev`` would attach to port 1420 and never exit; for
    # lint/vitest we want ``npm run lint`` / ``npm run test`` to
    # fire once and return with the tool's exit code.
    command: ["sleep", "infinity"]
    working_dir: /app/frontend
    # No entrypoint shim — there's no dev-mode env-var scrub needed
    # for the frontend (DEBUG/ENVIRONMENT/LOG_LEVEL are backend-only,
    # and apiBase() reads localStorage at runtime, not env vars).
    volumes:
      # Source mounts — read-WRITE here because some vitest suites
      # (e.g. ``catalog.test.ts`` snapshot files) write back to
      # ``frontend/src``. The host source remains the source of truth
      # — vitest writes only inside the project's own ``__tests__``
      # directories which are already git-tracked / git-ignored as
      # appropriate.
      - ./frontend/src:/app/frontend/src:rw
      - ./frontend/public:/app/frontend/public:rw
      - ./frontend/index.html:/app/frontend/index.html:rw
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts:rw
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json:rw
      - ./frontend/svelte.config.js:/app/frontend/svelte.config.js:rw
      - ./frontend/package.json:/app/frontend/package.json:rw
      - ./frontend/eslint.config.js:/app/frontend/eslint.config.js:rw
      - ./frontend/vitest.setup.ts:/app/frontend/vitest.setup.ts:rw
      # node_modules from the container — the host's was built against
      # host glibc / node and won't load inside the slim Debian image.
      # Anonymous volume keeps the container's node_modules separate
      # from the bind-mount and survives across successive ``run --rm``
      # invocations (warm cache benefit).
      - /app/frontend/node_modules
    # No ports, no network dependency on backend. ESLint + vitest
    # are in-process and don't touch /api.
