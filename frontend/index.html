<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover — позволяет нам использовать env(safe-area-inset-*)
      для iOS-ноутча и PWA на iOS/Android. Без этого safe-area не работает.
      user-scalable=no — отключает pinch-zoom (на desktop-only app не нужен).
      Maximum-scale=1 — блокирует зум после поворота экрана.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!--
      theme-color — статус-бар и адресная строка на iOS/Android
      подкрашиваются под тему. Dark-вариант переопределяется через
      <meta name="theme-color" media="(prefers-color-scheme: dark)">
      ниже, после FOUT-prevention script.

      App.svelte also keeps this in sync at runtime via MutationObserver
      (see App.svelte Phase 4.4).
    -->
    <meta name="theme-color" content="#07080a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7" />
    <title>Roleplay Studio</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Phase 5.2 — PWA manifest. iOS Safari uses apple-touch-icon above;
         iOS home-screen mode honors theme-color. Android/Chrome use
         manifest.webmanifest for installable PWA. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Roleplay" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif;
      }
    </style>
    <!-- Blocking script: prevent flash of wrong theme -->
    <script>
      (function () {
        var pref;
        try {
          pref = localStorage.getItem('theme_preference');
        } catch (e) {}
        var isDark;
        if (pref === 'dark') {
          isDark = true;
        } else if (pref === 'light') {
          isDark = false;
        } else {
          // system or unset
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
